<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CEMS 미션 QR · 화공관 2층 계단</title>
<style>
  :root {
    --accent: #2f9e6b;
    --accent-ink: #ffffff;
    --ink: #172018;
    --muted: #657267;
    --line: #dfe7dd;
    --paper: #fbfaf6;
    --soft: #eef7ea;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: linear-gradient(180deg, #f1f8ed, #f8f5eb);
    padding: 24px;
    font-family: "Pretendard", system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--ink);
  }
  .card {
    width: 320px;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 24px;
    background: var(--paper);
    box-shadow: 0 18px 40px -24px rgba(23, 32, 24, .42);
  }
  .head {
    padding: 16px 20px 18px;
    color: var(--accent-ink);
    background: linear-gradient(135deg, #16734d, #55b97b);
  }
  .brand {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    opacity: .9;
  }
  .loc {
    margin-top: 4px;
    font-size: 22px;
    font-weight: 850;
    line-height: 1.18;
    word-break: keep-all;
  }
  .body {
    padding: 22px 20px 18px;
    text-align: center;
  }
  .qr {
    width: 232px;
    height: 232px;
    margin: 0 auto;
    padding: 8px;
    border-radius: 18px;
    background: #ffffff;
    border: 1px solid var(--line);
  }
  .qr img {
    display: block;
    width: 100%;
    height: 100%;
  }
  .mission {
    margin-top: 16px;
    font-size: 16px;
    font-weight: 800;
  }
  .pts {
    display: inline-block;
    margin-left: 6px;
    padding: 2px 10px;
    border-radius: 999px;
    background: var(--soft);
    color: var(--accent);
    font-size: 14px;
    font-weight: 850;
  }
  .hint {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .url {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
    color: #8f9b90;
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size: 11px;
    word-break: break-all;
  }
  .print {
    margin-top: 18px;
  }
  .print button {
    border: 0;
    border-radius: 12px;
    background: var(--accent);
    color: var(--accent-ink);
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
    padding: 10px 18px;
  }
  @media print {
    body { background: #ffffff; padding: 0; }
    .card { box-shadow: none; border-color: #cbd7c9; }
    .print { display: none; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="brand">CEMS · 캠퍼스 에너지 미션</div>
      <div class="loc">화공관 2층 계단</div>
    </div>
    <div class="body">
      <div class="qr">
        <img src="./qr-chem-2f-stairs.svg" alt="화공관 2층 계단 QR" />
      </div>
      <div class="mission">계단 이용 인증 <span class="pts">+50P</span></div>
      <div class="hint">휴대폰 카메라로 QR을 스캔하세요</div>
      <div class="url">https://cems-kappa.vercel.app/ko/scan/chem-2f-stairs</div>
      <div class="print"><button type="button" onclick="window.print()">인쇄</button></div>
    </div>
  </div>
</body>
</html>
