<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CEMS 미션 QR · IT관 2층 계단</title>
<style>
  :root { --accent: #2563eb; --ink: #0f172a; --muted: #64748b; --line: #e2e8f0; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: #f1f5f9; padding: 24px;
    font-family: "Pretendard", system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    color: var(--ink);
  }
  .card {
    width: 320px; background: #fff; border: 1px solid var(--line);
    border-radius: 24px; overflow: hidden; box-shadow: 0 18px 40px -24px rgba(15,23,42,.45);
  }
  .head { background: var(--accent); color: #fff; padding: 14px 20px; }
  .brand { font-size: 12px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; opacity: .9; }
  .loc { font-size: 22px; font-weight: 800; margin-top: 2px; }
  .body { padding: 22px 20px 18px; text-align: center; }
  .qr { width: 232px; height: 232px; margin: 0 auto; }
  .qr svg { width: 100%; height: 100%; display: block; }
  .mission { margin-top: 16px; font-size: 16px; font-weight: 700; }
  .pts {
    display: inline-block; margin-left: 6px; padding: 2px 10px; border-radius: 999px;
    background: #eff6ff; color: var(--accent); font-size: 14px; font-weight: 800;
  }
  .hint { margin-top: 10px; font-size: 13px; color: var(--muted); }
  .url { margin-top: 14px; font-size: 11px; color: #94a3b8; word-break: break-all;
         border-top: 1px dashed var(--line); padding-top: 12px; font-family: ui-monospace, monospace; }
  .print { margin-top: 18px; }
  .print button {
    border: 0; background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
    padding: 10px 18px; border-radius: 12px; cursor: pointer;
  }
  @media print {
    body { background: #fff; padding: 0; }
    .card { box-shadow: none; border-color: #cbd5e1; }
    .print { display: none; }
  }
</style>
</head>
<body>
